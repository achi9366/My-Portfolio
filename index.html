<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Custom Chrome Wallpaper</title>
<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(-45deg, #9DB4D3, #b8c6db, #cfd9df, #9DB4D3);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  font-family: Arial, sans-serif;
}

/* Smooth Gradient Animation */
@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Floating Glass Cards */
.glass {
  position: absolute;
  width: 300px;
  height: 180px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  animation: float 6s ease-in-out infinite;
}

/* Multiple floating elements */
.card1 { top: 20%; left: 15%; animation-delay: 0s; }
.card2 { top: 50%; left: 60%; animation-delay: 2s; }
.card3 { top: 70%; left: 30%; animation-delay: 4s; }

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
  100% { transform: translateY(0px); }
}
</style>
</head>

<body>
  <div class="glass card1"></div>
  <div class="glass card2"></div>
  <div class="glass card3"></div>
</body>
</html>
